<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YGS Production Management V22</title>

    <!-- PWA / App-like Meta Tags -->
    <meta name="theme-color" content="#e50914">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YGS App">
    <link rel="apple-touch-icon" href="logo ygs 2.PNG">
    
    <!-- Inline Web App Manifest -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"YGS Production Management","short_name":"YGS App","start_url":".","display":"standalone","background_color":"#000000","theme_color":"#e50914","icons":[{"src":"logo ygs 2.PNG","sizes":"192x192","type":"image/png"}]}'>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { ygsred: '#e50914' } } }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');
        
        body { font-family: 'Montserrat', sans-serif; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        
        /* Light Mode */
        body { background-color: #f8fafc; color: #0f172a; }
        .card-dark { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .input-dark { background: #f1f5f9 !important; border: 1px solid #cbd5e1 !important; color: #0f172a !important; font-size: 11px; }
        
        /* Dark Mode */
        .dark body { background-color: #000000; color: #ffffff; }
        .dark .card-dark { background: #111111; border: 1px solid #333333; box-shadow: none; }
        .dark .input-dark { background: #1a1a1a !important; border: 1px solid #444444 !important; color: white !important; }
        
        .input-dark:focus { border-color: #e50914 !important; outline: none; box-shadow: 0 0 0 1px #e50914; }
        .btn-red { background-color: #e50914; color: white; transition: all 0.3s ease; }
        .btn-red:hover { background-color: #b20710; box-shadow: 0 4px 15px rgba(229,9,20,0.4); }
        
        .animate-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 5px; height: 5px;}
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #333333; }

        .toast-show { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .spec-table { width: 100%; text-align: left; border-collapse: collapse; font-size: 10px; }
        .spec-table th, .spec-table td { padding: 8px; border-bottom: 1px solid #333; }

        /* Calendar Styles */
        .cal-day { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; position: relative;}
        .cal-day.has-event { background: rgba(229, 9, 20, 0.1); color: #e50914; border-color: rgba(229, 9, 20, 0.2); }
        .cal-day.no-event { color: #64748b; }
        
        @media print {
            nav, header, .no-print { display: none !important; }
            .card-dark { border: 1px solid #ccc !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="min-h-screen pb-24 relative">

    <div id="loading-overlay" class="fixed inset-0 bg-white/90 dark:bg-black/90 z-[300] hidden flex flex-col justify-center items-center backdrop-blur-sm">
        <div class="w-12 h-12 border-4 border-ygsred border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold text-gray-600 dark:text-gray-300 tracking-widest uppercase" id="loading-text">Memproses...</p>
    </div>

    <!-- MODAL TAMBAH ASET -->
    <div id="modal-asset" class="fixed inset-0 bg-black/80 z-[500] hidden flex flex-col justify-center items-center p-4 backdrop-blur-sm animate-fade">
        <form id="form-asset" class="bg-white dark:bg-[#111] p-6 rounded-2xl w-full max-w-sm space-y-4 border border-gray-200 dark:border-zinc-800 shadow-2xl">
            <h3 class="text-lg font-black uppercase text-gray-900 dark:text-white border-b border-gray-200 dark:border-zinc-800 pb-2">Tambah Alat Baru</h3>
            <div class="space-y-1">
                <label class="text-[9px] font-bold text-gray-500 uppercase">Nama Alat / Unit</label>
                <input type="text" id="ast-name" class="w-full p-3 rounded-xl input-dark font-bold" placeholder="Cth: Shure SM58" required>
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-bold text-gray-500 uppercase">Kategori Divisi</label>
                <select id="ast-cat" class="w-full p-3 rounded-xl input-dark font-bold appearance-none" required>
                    <option value="Audio">🔊 Audio</option>
                    <option value="Lighting">💡 Lighting</option>
                    <option value="Genset">⚡ Genset</option>
                    <option value="Barikade">🚧 Barikade</option>
                    <option value="Rigging">🏗️ Rigging / Stage</option>
                    <option value="Transportasi">🚚 Transportasi</option>
                    <option value="Lainnya">📦 Lainnya</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-bold text-gray-500 uppercase">Jumlah Unit</label>
                <input type="number" id="ast-qty" class="w-full p-3 rounded-xl input-dark font-bold" placeholder="Cth: 10" required min="1">
            </div>
            <div class="flex gap-3 pt-4">
                <button type="button" onclick="closeAssetModal()" class="flex-1 py-3.5 rounded-xl bg-gray-200 dark:bg-zinc-800 text-gray-800 dark:text-white font-bold uppercase text-[10px] hover:bg-gray-300 dark:hover:bg-zinc-700 transition-colors">Batal</button>
                <button type="submit" class="flex-1 py-3.5 rounded-xl bg-ygsred text-white font-black uppercase text-[10px] shadow-lg shadow-red-900/30 hover:bg-red-700 transition-colors">Simpan Aset</button>
            </div>
        </form>
    </div>

    <div id="toast-container" class="fixed top-20 right-4 z-[400] space-y-2 flex flex-col items-end pointer-events-none"></div>
    <datalist id="list-crew"></datalist>

    <!-- AUTH / LOGIN -->
    <div id="view-auth" class="fixed inset-0 bg-gray-100 dark:bg-black z-[200] flex flex-col justify-center items-center p-6 no-print overflow-y-auto">
        <div class="w-full max-w-md card-dark p-8 rounded-2xl border-t-4 border-t-ygsred my-auto text-center">
            <img src="logo ygs 2.PNG" alt="Logo YGS" class="w-32 h-auto object-contain mb-2 mx-auto dark:hidden" onerror="this.style.display='none';">
            <img src="logo ygs.PNG" alt="Logo YGS" class="w-32 h-auto object-contain mb-2 mx-auto hidden dark:block" onerror="this.style.display='none';">
            <h1 class="text-xl font-black text-gray-900 dark:text-white uppercase tracking-widest mt-2 mb-8">YGS Production</h1>
            
            <form id="login-form" class="space-y-4">
                <input type="text" id="log-username" class="w-full p-3 rounded-lg input-dark font-bold" placeholder="Username" required>
                <input type="password" id="log-password" class="w-full p-3 rounded-lg input-dark font-bold" placeholder="Password" required>
                <button type="submit" class="w-full btn-red py-3.5 rounded-lg font-black text-sm uppercase tracking-widest shadow-lg">Login Sistem</button>
                <p class="text-center text-[10px] text-gray-500 mt-4 uppercase font-bold tracking-widest">Kru Baru? <a href="#" onclick="toggleAuth('register')" class="text-ygsred hover:underline">Daftar Akun</a></p>
            </form>

            <form id="register-form" class="space-y-3 hidden">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="reg-fullname" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="Nama Lengkap" required>
                    <input type="text" id="reg-nickname" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="Panggilan" required>
                </div>
                <input type="text" id="reg-position" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="Jabatan Utama" required>
                <input type="text" id="reg-phone" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="No. WhatsApp" required>
                <div class="flex gap-1 items-center">
                    <button type="button" onclick="sendSimulatedOTP()" id="btn-send-otp" class="bg-green-600 hover:bg-green-700 text-white text-[9px] uppercase font-bold py-3 px-2 rounded-lg flex-1">Kirim OTP WA</button>
                    <input type="text" id="reg-otp" class="w-full p-2.5 rounded-lg input-dark font-bold hidden text-center flex-1" placeholder="Kode 4 Digit" maxlength="4">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="reg-username" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="Username" required>
                    <input type="password" id="reg-password" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="Password" required>
                </div>
                <div class="flex gap-2 items-center bg-gray-100 dark:bg-zinc-800 p-2 rounded-lg">
                    <span id="captcha-question" class="bg-white dark:bg-zinc-900 px-3 py-2 rounded font-black text-sm text-ygsred w-24 text-center"></span>
                    <input type="number" id="reg-captcha" class="flex-1 p-2.5 rounded-lg input-dark font-bold text-center" placeholder="?" required>
                </div>
                <button type="submit" class="w-full bg-gray-900 dark:bg-zinc-800 text-white py-3.5 rounded-lg font-black text-xs uppercase hover:bg-black">Daftar Akun Baru</button>
                <p class="text-center text-[10px] text-gray-500 mt-4 uppercase font-bold tracking-widest">Kembali ke <a href="#" onclick="toggleAuth('login')" class="text-ygsred hover:underline">Login</a></p>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-content" class="hidden min-h-screen pt-4">
        <header class="p-4 flex justify-between items-center bg-white/90 dark:bg-black/90 border-b border-gray-200 dark:border-zinc-800 sticky top-0 z-[100] no-print">
            <div class="flex items-center gap-3">
                <div class="bg-ygsred p-1.5 rounded">
                    <svg width="20" height="20" viewBox="0 0 100 100" fill="none"><path d="M30 35H45L55 65H40L30 35Z" fill="white"/><path d="M55 35H70L60 65H45L55 35Z" fill="black"/></svg>
                </div>
                <div>
                    <h1 class="text-xs font-black text-gray-900 dark:text-white tracking-tighter leading-none uppercase">YGS Production</h1>
                    <p id="user-display" class="text-[9px] font-bold text-ygsred uppercase"></p>
                </div>
            </div>
            <button onclick="fetchData()" class="p-2 text-gray-500 hover:text-ygsred"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
        </header>

        <main class="p-4 max-w-4xl mx-auto space-y-4">
            
            <!-- TAB: JADWAL -->
            <div id="view-list" class="animate-fade">
                <div class="flex justify-center gap-2 mb-6 bg-gray-100 dark:bg-zinc-900 p-1.5 rounded-xl border border-gray-200 dark:border-zinc-800">
                    <button onclick="setAgendaView('kalender')" id="btn-view-kalender" class="flex-1 text-[10px] font-bold uppercase px-4 py-2 rounded-lg bg-white dark:bg-black shadow text-ygsred">Kalender</button>
                    <button onclick="setAgendaView('semua')" id="btn-view-semua" class="flex-1 text-[10px] font-bold uppercase px-4 py-2 rounded-lg text-gray-500">Semua</button>
                    <button onclick="setAgendaView('saya')" id="btn-view-saya" class="flex-1 text-[10px] font-bold uppercase px-4 py-2 rounded-lg text-gray-500">Tugas Saya</button>
                </div>

                <div id="wrapper-kalender" class="card-dark p-4 rounded-2xl mb-6">
                    <div class="flex justify-between items-center mb-4 border-b dark:border-zinc-800 pb-3">
                        <button onclick="changeMonth(-1)"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        <h2 id="cal-month-year" class="text-sm font-black uppercase tracking-widest text-gray-900 dark:text-white">BULAN TAHUN</h2>
                        <button onclick="changeMonth(1)"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                    </div>
                    <div class="grid grid-cols-7 gap-1 mb-2 text-center text-[10px] font-black text-gray-400 uppercase tracking-widest">
                        <div>Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div>Sab</div>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-1 sm:gap-2"></div>
                </div>

                <div class="flex justify-between items-end mb-2">
                    <h3 class="text-[10px] font-black text-ygsred uppercase tracking-widest" id="selected-date-label">Agenda</h3>
                </div>
                <div id="project-container" class="space-y-3"></div>
            </div>

            <!-- TAB: CHAT -->
            <div id="view-chat" class="hidden animate-fade flex flex-col h-[calc(100vh-160px)]">
                <div class="flex-1 overflow-y-auto space-y-3 pr-2 card-dark p-4 rounded-xl mb-3" id="chat-container"></div>
                <form id="chat-form" class="flex gap-2 bg-white dark:bg-zinc-900 p-2 rounded-xl border dark:border-zinc-800">
                    <input type="text" id="chat-input" class="flex-1 bg-transparent border-none text-sm text-gray-900 dark:text-white px-2 focus:ring-0" placeholder="Ketik pesan..." required>
                    <button type="submit" class="bg-ygsred text-white p-2.5 rounded-lg"><i data-lucide="send" class="w-4 h-4"></i></button>
                </form>
            </div>

            <!-- TAB: INVENTARIS ASET -->
            <div id="view-assets" class="hidden animate-fade space-y-4">
                <div class="flex justify-between items-center border-b-2 border-ygsred pb-1">
                    <h2 class="text-lg font-black uppercase text-gray-900 dark:text-white">Inventaris Alat</h2>
                    <div class="flex gap-2">
                        <select id="asset-sort-by" onchange="renderAssets()" class="text-[9px] bg-gray-100 dark:bg-zinc-800 font-bold border-none rounded px-2 focus:ring-0">
                            <option value="cat">Sort: Kategori</option>
                            <option value="status">Sort: Status</option>
                        </select>
                        <button class="text-[10px] bg-ygsred text-white px-3 py-1.5 rounded font-bold" onclick="openAssetModal()">+ Tambah</button>
                    </div>
                </div>
                <div id="asset-list-container" class="space-y-6">
                    <!-- Data ditaruh di sini per kategori/status -->
                </div>
            </div>

            <!-- TAB: PROFIL -->
            <div id="view-profile" class="hidden animate-fade space-y-4">
                <div class="card-dark p-6 rounded-2xl border-t-4 border-t-ygsred flex flex-col items-center text-center">
                    <div class="w-20 h-20 bg-gray-100 dark:bg-zinc-900 rounded-full flex items-center justify-center font-black text-3xl text-ygsred uppercase mb-4" id="profile-initial"></div>
                    <h3 id="profile-fullname" class="text-xl font-black uppercase mb-1 text-gray-900 dark:text-white"></h3>
                    <p id="profile-position" class="text-xs font-bold text-ygsred uppercase tracking-widest mb-4"></p>
                    <button onclick="logout()" class="w-full bg-red-50 dark:bg-red-950/20 text-ygsred py-3 rounded-xl font-black text-xs uppercase border border-red-200 dark:border-red-900/50">Logout (Keluar)</button>
                </div>
                <div class="card-dark p-5 rounded-2xl">
                    <h3 class="text-[10px] font-black uppercase mb-3 text-gray-500">Riwayat Penugasan</h3>
                    <div id="profile-history" class="space-y-2"></div>
                </div>
            </div>

        </main>

        <!-- NAVIGATION -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-black/95 border-t border-gray-200 dark:border-zinc-800 flex justify-around p-2 z-[100] backdrop-blur-md">
            <button onclick="switchTab('list')" class="flex flex-col items-center gap-1 text-gray-400 p-2 rounded-xl" id="nav-list"><i data-lucide="calendar" class="w-5 h-5"></i><span class="text-[8px] font-bold">JADWAL</span></button>
            <button onclick="switchTab('chat')" class="flex flex-col items-center gap-1 text-gray-400 p-2 rounded-xl" id="nav-chat"><i data-lucide="message-square" class="w-5 h-5"></i><span class="text-[8px] font-bold">CHAT</span></button>
            <button onclick="switchTab('assets')" class="flex flex-col items-center gap-1 text-gray-400 p-2 rounded-xl" id="nav-assets"><i data-lucide="box" class="w-5 h-5"></i><span class="text-[8px] font-bold">ASET</span></button>
            <button onclick="switchTab('profile')" class="flex flex-col items-center gap-1 text-gray-400 p-2 rounded-xl" id="nav-profile"><i data-lucide="user" class="w-5 h-5"></i><span class="text-[8px] font-bold">PROFIL</span></button>
        </nav>
    </div>

    <script>
        // API URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6alw0e-EwkuHNc0g0L25WOUo-Dx_LyLsaf7DEBOVUGZlr7bTD6hJXWv66mFobfDM/exec'; 
        
        let currentUser = null;
        let allProjects = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let activeAgendaView = 'kalender';

        function showLoading(show, text = 'Memproses...') {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        }

        function showToast(msg, isError=false) {
            const container = document.getElementById('toast-container'); const t = document.createElement('div');
            t.className = `toast-show px-4 py-3 rounded-xl shadow-xl text-xs font-bold text-white flex items-center gap-2 pointer-events-auto ${isError ? 'bg-red-600' : 'bg-gray-900 dark:bg-zinc-800'}`;
            t.innerHTML = `<i data-lucide="${isError?'alert-circle':'check-circle'}" class="w-4 h-4"></i> ${msg}`;
            container.appendChild(t); if(typeof lucide!=='undefined') lucide.createIcons();
            setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
        }

        async function apiCall(payload) {
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return JSON.parse(await res.text());
            } catch (e) {
                console.error("API Error:", e);
                return { success: false, message: "Koneksi ke server gagal" };
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('ygsUserEx');
            if(saved) { currentUser = JSON.parse(saved); initApp(); }
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }

        function toggleAuth(type) { 
            document.getElementById('login-form').classList.toggle('hidden', type !== 'login'); 
            document.getElementById('register-form').classList.toggle('hidden', type !== 'register'); 
            if(type === 'register') generateCaptcha();
        }

        function generateCaptcha() {
            const n1 = Math.floor(Math.random() * 10); const n2 = Math.floor(Math.random() * 10);
            window.capAns = n1 + n2;
            document.getElementById('captcha-question').innerText = `${n1} + ${n2}`;
        }

        function sendSimulatedOTP() {
            alert("Simulasi OTP: 1234 telah dikirim ke WA Anda.");
            document.getElementById('reg-otp').classList.remove('hidden');
            window.simOtp = "1234";
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            showLoading(true, 'Masuk...');
            const res = await apiCall({ action: 'LOGIN', payload: { username: document.getElementById('log-username').value.toLowerCase(), password: document.getElementById('log-password').value } });
            showLoading(false);
            if(res && res.success) { currentUser = res.user; localStorage.setItem('ygsUserEx', JSON.stringify(currentUser)); initApp(); } 
            else showToast(res.message || "Login gagal", true);
        };

        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            if(parseInt(document.getElementById('reg-captcha').value) !== window.capAns) { showToast("Captcha salah", true); return; }
            if(document.getElementById('reg-otp').value !== window.simOtp) { showToast("OTP salah", true); return; }
            showLoading(true, 'Daftar...');
            const p = { 
                fullName: document.getElementById('reg-fullname').value, nickname: document.getElementById('reg-nickname').value, 
                position: document.getElementById('reg-position').value, phone: document.getElementById('reg-phone').value,
                username: document.getElementById('reg-username').value.toLowerCase(), password: document.getElementById('reg-password').value
            };
            const res = await apiCall({ action: 'REGISTER', payload: p });
            showLoading(false);
            if(res && res.success) { showToast("Berhasil! Silakan Login."); toggleAuth('login'); } else showToast(res.message, true);
        };

        function initApp() {
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser.nickname || currentUser.fullName;
            document.getElementById('profile-fullname').innerText = currentUser.fullName;
            document.getElementById('profile-position').innerText = currentUser.position;
            document.getElementById('profile-initial').innerText = (currentUser.nickname || currentUser.fullName).substring(0,2);
            fetchData();
            switchTab('list');
        }

        function logout() { localStorage.removeItem('ygsUserEx'); location.reload(); }

        function switchTab(tab) {
            ['view-list', 'view-chat', 'view-assets', 'view-profile'].forEach(v => document.getElementById(v).classList.add('hidden'));
            document.getElementById('view-' + tab).classList.remove('hidden');
            ['nav-list', 'nav-chat', 'nav-assets', 'nav-profile'].forEach(n => {
                const nav = document.getElementById(n);
                nav.classList.remove('text-ygsred', 'bg-red-50', 'dark:bg-red-900/20');
                if(n === 'nav-' + tab) nav.classList.add('text-ygsred', 'bg-red-50', 'dark:bg-red-900/20');
            });
            if(tab === 'chat') renderChat();
            if(tab === 'assets') renderAssets();
            if(tab === 'profile') renderProfileSchedule();
            window.scrollTo(0,0);
        }

        async function fetchData() {
            showLoading(true, 'Sync...');
            const res = await apiCall({ action: 'GET_DATA' });
            showLoading(false);
            if(res && res.success) { allProjects = res.data; applyAgendaView(); }
        }

        // --- INVENTARIS ASET (REVISI V22: CATATAN PUBLIK UNTUK SEMUA KRU) ---

        function openAssetModal() { document.getElementById('modal-asset').classList.remove('hidden'); }
        function closeAssetModal() { document.getElementById('modal-asset').classList.add('hidden'); document.getElementById('form-asset').reset(); }

        document.getElementById('form-asset').onsubmit = async (e) => {
            e.preventDefault();
            const payload = { 
                name: document.getElementById('ast-name').value, 
                cat: document.getElementById('ast-cat').value, 
                qty: document.getElementById('ast-qty').value,
                status: 'Baik',
                note: ''
            };
            showLoading(true);
            await apiCall({ action: 'SAVE_ASSET', payload });
            showLoading(false);
            closeAssetModal();
            renderAssets();
        };

        async function updateAssetStatus(id, newStatus) {
            showLoading(true, 'Update status...');
            const res = await apiCall({ action: 'UPDATE_ASSET_STATUS', payload: { id, status: newStatus } });
            showLoading(false);
            if(res && res.success) showToast("Status diperbarui"); else showToast("Gagal update", true);
        }

        async function updateAssetNote(id, newNote) {
            showLoading(true, 'Menyimpan catatan...');
            const res = await apiCall({ action: 'UPDATE_ASSET_NOTE', payload: { id, note: newNote } });
            showLoading(false);
            if(res && res.success) showToast("Catatan tersimpan"); else showToast("Gagal simpan catatan", true);
        }

        async function renderAssets() {
            const container = document.getElementById('asset-list-container');
            const sortBy = document.getElementById('asset-sort-by').value;
            container.innerHTML = '<p class="text-center text-[10px] animate-pulse">Menarik data aset...</p>';
            
            const res = await apiCall({ action: 'GET_ASSETS' });
            if(!res || !res.success) { container.innerHTML = '<p class="text-center text-red-500 text-[10px]">Gagal memuat data.</p>'; return; }
            
            const data = res.data || [];
            if(data.length === 0) { container.innerHTML = '<p class="text-center text-gray-500 text-[10px]">Gudang Kosong.</p>'; return; }

            // Kelompokkan berdasarkan pilihan sort (Category atau Status)
            const groups = {};
            data.forEach(a => {
                const groupKey = a[sortBy] || 'Lainnya';
                if(!groups[groupKey]) groups[groupKey] = [];
                groups[groupKey].push(a);
            });

            const sortedKeys = Object.keys(groups).sort();
            
            container.innerHTML = sortedKeys.map(key => {
                const items = groups[key].sort((a,b) => a.name.localeCompare(b.name));
                return `
                    <div class="card-dark rounded-xl overflow-hidden shadow-sm">
                        <div class="bg-gray-100 dark:bg-zinc-900 px-4 py-2 border-b dark:border-zinc-800">
                            <h3 class="text-[10px] font-black uppercase text-ygsred tracking-widest">${key}</h3>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left text-[10px]">
                                <thead class="bg-gray-50 dark:bg-zinc-900/50 text-gray-400 uppercase font-black">
                                    <tr>
                                        <th class="p-3">Alat</th>
                                        <th class="p-3 text-center">Qty</th>
                                        <th class="p-3 text-center">Status</th>
                                        <th class="p-3">Catatan (Publik)</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y dark:divide-zinc-800">
                                    ${items.map(a => {
                                        const isAdmin = currentUser.role === 'admin';
                                        const statuses = ['Baik', 'Rusak', 'Service', 'Hilang'];
                                        const colors = { 'Baik': 'text-green-500', 'Rusak': 'text-red-500', 'Service': 'text-yellow-500', 'Hilang': 'text-gray-500' };
                                        
                                        let statusHtml = '';

                                        // Status tetap Admin-only untuk keamanan validasi
                                        if(isAdmin) {
                                            statusHtml = `
                                                <select onchange="updateAssetStatus('${a.id}', this.value)" class="bg-transparent border-none font-bold focus:ring-0 ${colors[a.status] || ''}">
                                                    ${statuses.map(s => `<option value="${s}" ${a.status === s ? 'selected' : ''}>${s}</option>`).join('')}
                                                </select>`;
                                        } else {
                                            statusHtml = `<span class="font-bold ${colors[a.status] || ''}">${a.status || 'Baik'}</span>`;
                                        }

                                        // REVISI V22: Kolom Catatan selalu input text agar bisa diisi siapa saja
                                        const noteHtml = `<input type="text" value="${a.note || ''}" onblur="updateAssetNote('${a.id}', this.value)" placeholder="Tambah catatan..." class="bg-transparent border-b border-gray-200 dark:border-zinc-800 w-full focus:border-ygsred outline-none text-[10px] py-1">`;

                                        return `
                                            <tr class="hover:bg-gray-50 dark:hover:bg-zinc-800/30">
                                                <td class="p-3 font-bold dark:text-zinc-200 uppercase">${a.name}</td>
                                                <td class="p-3 text-center font-black">${a.qty}</td>
                                                <td class="p-3 text-center">${statusHtml}</td>
                                                <td class="p-3">${noteHtml}</td>
                                            </tr>
                                        `;
                                    }).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // --- CHAT ---

        async function renderChat() {
            const container = document.getElementById('chat-container');
            container.innerHTML = '<p class="text-center animate-pulse text-[10px]">Loading chat...</p>';
            const res = await apiCall({ action: 'GET_CHATS' });
            if(!res || !res.success) return;
            const chats = res.data || [];
            if(chats.length === 0) { container.innerHTML = '<p class="text-center text-gray-500 text-[10px] mt-10">Belum ada obrolan.</p>'; return; }
            container.innerHTML = chats.map(c => {
                const isMe = c.sender === (currentUser.nickname || currentUser.fullName);
                return `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                    <span class="text-[8px] font-bold text-gray-500 mb-0.5">${c.sender} • ${new Date(c.time).toLocaleTimeString()}</span>
                    <div class="px-3 py-2 rounded-2xl max-w-[85%] text-xs font-bold ${isMe ? 'bg-ygsred text-white rounded-br-none' : 'bg-gray-100 dark:bg-zinc-800 text-gray-900 dark:text-white rounded-bl-none'}">${c.msg}</div>
                </div>`;
            }).join('');
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const inp = document.getElementById('chat-input'); const msg = inp.value.trim(); if(!msg) return;
            inp.value = '';
            await apiCall({ action: 'ADD_CHAT', payload: { sender: currentUser.nickname || currentUser.fullName, msg, time: new Date().toISOString() } });
            renderChat();
        };

        // --- JADWAL ---

        function setAgendaView(mode) {
            activeAgendaView = mode;
            ['kalender', 'semua', 'saya'].forEach(m => {
                const btn = document.getElementById('btn-view-' + m);
                btn.classList.toggle('bg-white', m === mode);
                btn.classList.toggle('dark:bg-black', m === mode);
                btn.classList.toggle('text-ygsred', m === mode);
                btn.classList.toggle('text-gray-500', m !== mode);
            }); applyAgendaView();
        }

        function applyAgendaView() {
            const wrapCal = document.getElementById('wrapper-kalender');
            const container = document.getElementById('project-container');
            if(activeAgendaView === 'kalender') { wrapCal.classList.remove('hidden'); renderCalendar(); }
            else {
                wrapCal.classList.add('hidden');
                let filtered = activeAgendaView === 'semua' ? allProjects : allProjects.filter(p => JSON.stringify(p.manpower || {}).includes(currentUser.nickname || currentUser.fullName));
                container.innerHTML = filtered.map(p => renderEventCard(p)).join('') || '<p class="text-center text-gray-500 text-[10px]">Kosong.</p>';
                if(typeof lucide !== 'undefined') lucide.createIcons();
            }
        }

        function renderEventCard(p) {
            const dateStr = new Date(p.eventDate).toLocaleDateString('id-ID', {day:'numeric', month:'short'});
            return `<div onclick="viewDetail('${p.id}')" class="bg-white dark:bg-zinc-900 p-4 rounded-xl border-l-4 border-l-ygsred flex justify-between items-center cursor-pointer mb-3">
                <div>
                    <h3 class="font-black text-sm uppercase text-gray-900 dark:text-white">${p.eventName}</h3>
                    <p class="text-[10px] text-ygsred font-bold uppercase">${p.artist}</p>
                    <p class="text-[9px] text-gray-500 mt-1">${dateStr}</p>
                </div>
                <i data-lucide="chevron-right" class="text-gray-400 w-4 h-4"></i>
            </div>`;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const title = document.getElementById('cal-month-year');
            grid.innerHTML = '';
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            title.innerText = `${months[currentMonth]} ${currentYear}`;
            const firstDay = new Date(currentYear, currentMonth, 1).getDay();
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            const eventMap = {};
            allProjects.forEach(p => { const d = p.eventDate.split('T')[0]; if(!eventMap[d]) eventMap[d]=[]; eventMap[d].push(p); });
            for(let i=0; i<firstDay; i++) grid.innerHTML += `<div class="cal-day empty"></div>`;
            for(let i=1; i<=daysInMonth; i++) {
                const dateStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasEvent = eventMap[dateStr] && eventMap[dateStr].length > 0;
                grid.innerHTML += `<div class="cal-day ${hasEvent ? 'has-event' : 'no-event'}" onclick="showEventsOnDate('${dateStr}')">${i}</div>`;
            }
        }

        function showEventsOnDate(dateStr) {
            const filtered = allProjects.filter(p => p.eventDate.startsWith(dateStr));
            document.getElementById('project-container').innerHTML = filtered.map(p => renderEventCard(p)).join('') || '<p class="text-center text-red-500 text-[10px] uppercase font-bold p-10 bg-red-50 dark:bg-red-950/20 rounded-xl">Free / Kosong</p>';
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }

        function changeMonth(dir) { currentMonth += dir; if(currentMonth>11){currentMonth=0;currentYear++} if(currentMonth<0){currentMonth=11;currentYear--} renderCalendar(); }

        function renderProfileSchedule() {
            const crewName = currentUser.nickname || currentUser.fullName;
            const matches = allProjects.filter(p => JSON.stringify(p.manpower || {}).includes(crewName));
            document.getElementById('profile-history').innerHTML = matches.map(p => `
                <div class="bg-gray-50 dark:bg-zinc-900/50 p-3 rounded-lg text-[9px] font-bold uppercase flex justify-between">
                    <span>${p.eventName}</span>
                    <span class="text-ygsred">${new Date(p.eventDate).toLocaleDateString()}</span>
                </div>
            `).join('') || '<p class="text-center text-gray-500 text-[8px]">Belum ada data.</p>';
        }

    </script>
</body>
</html>
