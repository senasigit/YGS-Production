<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YGS Production Management V23</title>

    <!-- PWA / App-like Meta Tags -->
    <meta name="theme-color" content="#e50914">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="YGS App">
    <link rel="apple-touch-icon" href="logo ygs 2.PNG">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { ygsred: '#e50914' } } }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');
        
        body { font-family: 'Montserrat', sans-serif; overflow-x: hidden; transition: background-color 0.3s, color 0.3s; }
        
        /* Light Mode */
        body { background-color: #f8fafc; color: #0f172a; }
        .card-dark { background: #ffffff; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .input-dark { background: #f1f5f9 !important; border: 1px solid #cbd5e1 !important; color: #0f172a !important; font-size: 11px; }
        
        /* Dark Mode */
        .dark body { background-color: #000000; color: #ffffff; }
        .dark .card-dark { background: #111111; border: 1px solid #333333; box-shadow: none; }
        .dark .input-dark { background: #1a1a1a !important; border: 1px solid #444444 !important; color: white !important; }
        
        .btn-red { background-color: #e50914; color: white; transition: all 0.3s ease; }
        .btn-red:hover { background-color: #b20710; box-shadow: 0 4px 15px rgba(229,9,20,0.4); }
        
        .animate-fade { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 5px; height: 5px;}
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #333333; }

        .toast-show { animation: slideIn 0.3s ease-out forwards; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .cal-day { height: 40px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; position: relative;}
        .cal-day.has-event { background: rgba(229, 9, 20, 0.1); color: #e50914; border-color: rgba(229, 9, 20, 0.2); }
        
        @media print {
            nav, header, .no-print { display: none !important; }
            .card-dark { border: 1px solid #ccc !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="min-h-screen pb-24 relative">

    <div id="loading-overlay" class="fixed inset-0 bg-white/90 dark:bg-black/90 z-[300] hidden flex flex-col justify-center items-center backdrop-blur-sm">
        <div class="w-12 h-12 border-4 border-ygsred border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-xs font-bold text-gray-600 dark:text-gray-300 tracking-widest uppercase" id="loading-text">Memproses...</p>
    </div>

    <!-- MODAL TAMBAH ASET -->
    <div id="modal-asset" class="fixed inset-0 bg-black/80 z-[500] hidden flex flex-col justify-center items-center p-4 backdrop-blur-sm animate-fade">
        <form id="form-asset" class="bg-white dark:bg-[#111] p-6 rounded-2xl w-full max-w-sm space-y-4 border dark:border-zinc-800 shadow-2xl">
            <h3 class="text-lg font-black uppercase text-gray-900 dark:text-white border-b dark:border-zinc-800 pb-2">Tambah Alat Baru</h3>
            <div class="space-y-1">
                <label class="text-[9px] font-bold text-gray-500 uppercase">Nama Alat</label>
                <input type="text" id="ast-name" class="w-full p-3 rounded-xl input-dark font-bold" required>
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-bold text-gray-500 uppercase">Kategori</label>
                <select id="ast-cat" class="w-full p-3 rounded-xl input-dark font-bold appearance-none" required>
                    <option value="Audio">Audio</option>
                    <option value="Lighting">Lighting</option>
                    <option value="Genset">Genset</option>
                    <option value="Rigging">Rigging</option>
                    <option value="Transportasi">Transportasi</option>
                </select>
            </div>
            <div class="space-y-1">
                <label class="text-[9px] font-bold text-gray-500 uppercase">Qty</label>
                <input type="number" id="ast-qty" class="w-full p-3 rounded-xl input-dark font-bold" required min="1">
            </div>
            <div class="flex gap-3 pt-4">
                <button type="button" onclick="closeAssetModal()" class="flex-1 py-3.5 rounded-xl bg-gray-200 dark:bg-zinc-800 text-gray-800 dark:text-white font-bold uppercase text-[10px]">Batal</button>
                <button type="submit" class="flex-1 py-3.5 rounded-xl bg-ygsred text-white font-black uppercase text-[10px]">Simpan</button>
            </div>
        </form>
    </div>

    <!-- MODAL KEUANGAN (ADMIN ONLY) -->
    <div id="modal-finance" class="fixed inset-0 bg-black/80 z-[500] hidden flex flex-col justify-center items-center p-4 backdrop-blur-sm animate-fade">
        <div class="bg-white dark:bg-[#111] p-6 rounded-2xl w-full max-w-md space-y-4 border dark:border-zinc-800 shadow-2xl max-h-[80vh] flex flex-col">
            <div class="flex justify-between items-center border-b dark:border-zinc-800 pb-2">
                <h3 class="text-sm font-black uppercase text-gray-900 dark:text-white">Input Gaji: <span id="finance-crew-name" class="text-ygsred"></span></h3>
                <button onclick="closeFinanceModal()"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="overflow-y-auto flex-1 space-y-3" id="finance-modal-list"></div>
            <button onclick="saveFinance()" class="w-full py-3.5 rounded-xl bg-blue-600 text-white font-black uppercase text-[10px] shadow-lg">Simpan Gaji</button>
        </div>
    </div>

    <div id="toast-container" class="fixed top-20 right-4 z-[400] space-y-2 flex flex-col items-end pointer-events-none"></div>
    <datalist id="list-crew"></datalist>

    <!-- AUTH / LOGIN -->
    <div id="view-auth" class="fixed inset-0 bg-gray-100 dark:bg-black z-[200] flex flex-col justify-center items-center p-6 no-print overflow-y-auto">
        <div class="w-full max-w-md card-dark p-8 rounded-2xl border-t-4 border-t-ygsred my-auto text-center">
            <img src="logo ygs 2.PNG" class="w-32 mx-auto mb-2 dark:hidden">
            <img src="logo ygs.PNG" class="w-32 mx-auto mb-2 hidden dark:block">
            <h1 class="text-xl font-black text-gray-900 dark:text-white uppercase tracking-widest mt-2 mb-8">YGS Production</h1>
            <form id="login-form" class="space-y-4">
                <input type="text" id="log-username" class="w-full p-3 rounded-lg input-dark font-bold" placeholder="Username" required>
                <input type="password" id="log-password" class="w-full p-3 rounded-lg input-dark font-bold" placeholder="Password" required>
                <button type="submit" class="w-full btn-red py-3.5 rounded-lg font-black text-sm uppercase tracking-widest">Login</button>
                <p class="text-[10px] text-gray-500 mt-4 uppercase font-bold">Kru Baru? <a href="#" onclick="toggleAuth('register')" class="text-ygsred">Daftar Akun</a></p>
            </form>
            <form id="register-form" class="space-y-3 hidden">
                <input type="text" id="reg-fullname" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="Nama Lengkap" required>
                <input type="text" id="reg-nickname" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="Panggilan" required>
                <input type="text" id="reg-position" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="Jabatan" required>
                <input type="text" id="reg-phone" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="WhatsApp" required>
                <input type="text" id="reg-username" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="Username" required>
                <input type="password" id="reg-password" class="w-full p-2.5 rounded-lg input-dark font-bold" placeholder="Password" required>
                <button type="submit" class="w-full bg-zinc-800 text-white py-3.5 rounded-lg font-black text-xs uppercase">Daftar</button>
                <p class="text-[10px] text-gray-500 mt-4 uppercase font-bold">Punya Akun? <a href="#" onclick="toggleAuth('login')" class="text-ygsred">Login</a></p>
            </form>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="app-content" class="hidden min-h-screen pt-4">
        <header class="p-4 flex justify-between items-center bg-white/90 dark:bg-black/90 border-b dark:border-zinc-800 sticky top-0 z-[100] no-print">
            <div class="flex items-center gap-3">
                <div class="bg-ygsred p-1.5 rounded">
                    <svg width="20" height="20" viewBox="0 0 100 100" fill="none"><path d="M30 35H45L55 65H40L30 35Z" fill="white"/><path d="M55 35H70L60 65H45L55 35Z" fill="black"/></svg>
                </div>
                <div>
                    <h1 class="text-xs font-black text-gray-900 dark:text-white uppercase">YGS Pro</h1>
                    <p id="user-display" class="text-[9px] font-bold text-ygsred uppercase"></p>
                </div>
            </div>
            <button onclick="fetchData()" class="p-2 text-gray-500 hover:text-ygsred"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
        </header>

        <main class="p-4 max-w-4xl mx-auto space-y-4">
            
            <!-- TAB: JADWAL -->
            <div id="view-list" class="animate-fade">
                <div class="flex justify-center gap-2 mb-6 bg-gray-100 dark:bg-zinc-900 p-1.5 rounded-xl border dark:border-zinc-800">
                    <button onclick="setAgendaView('kalender')" id="btn-view-kalender" class="flex-1 text-[10px] font-bold uppercase px-4 py-2 rounded-lg bg-white dark:bg-black shadow text-ygsred">Kalender</button>
                    <button onclick="setAgendaView('semua')" id="btn-view-semua" class="flex-1 text-[10px] font-bold uppercase px-4 py-2 rounded-lg text-gray-500">Semua</button>
                    <button onclick="setAgendaView('saya')" id="btn-view-saya" class="flex-1 text-[10px] font-bold uppercase px-4 py-2 rounded-lg text-gray-500">Tugas Saya</button>
                </div>
                <div id="wrapper-kalender" class="card-dark p-4 rounded-2xl mb-6">
                    <div class="flex justify-between items-center mb-4 border-b dark:border-zinc-800 pb-3">
                        <button onclick="changeMonth(-1)"><i data-lucide="chevron-left" class="w-5 h-5"></i></button>
                        <h2 id="cal-month-year" class="text-sm font-black uppercase tracking-widest text-gray-900 dark:text-white">BULAN TAHUN</h2>
                        <button onclick="changeMonth(1)"><i data-lucide="chevron-right" class="w-5 h-5"></i></button>
                    </div>
                    <div id="calendar-grid" class="grid grid-cols-7 gap-1 sm:gap-2"></div>
                </div>
                <div id="project-container" class="space-y-3"></div>
            </div>

            <!-- TAB: CREATE (ADMIN ONLY VIEW LOGIC) -->
            <div id="view-add" class="hidden animate-fade space-y-4">
                <h2 class="text-lg font-black uppercase border-b-2 border-ygsred pb-1 inline-block">Create Event</h2>
                <form id="event-form" class="space-y-4">
                    <input type="hidden" id="edit-id" value="">
                    <div class="card-dark p-4 rounded-xl space-y-3">
                        <input type="text" id="eventName" placeholder="Nama Event" class="w-full p-2.5 rounded input-dark font-bold" required>
                        <input type="text" id="artist" placeholder="Artis / Klien" class="w-full p-2.5 rounded input-dark font-bold" required>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="date" id="startDate" class="w-full p-2.5 rounded input-dark font-bold" required>
                            <select id="evStatus" class="w-full p-2.5 rounded input-dark font-bold">
                                <option value="Tentative">Tentative</option>
                                <option value="Confirmed">Confirmed</option>
                            </select>
                        </div>
                        <input type="text" id="pic" list="list-crew" placeholder="PIC Utama" class="w-full p-2.5 rounded input-dark font-bold">
                        <textarea id="manpower-input" placeholder="Plotting Kru Lain (Ketik Nama, pisahkan koma)" class="w-full p-2.5 rounded input-dark font-bold h-20"></textarea>
                    </div>
                    <button type="submit" class="w-full btn-red py-4 rounded-xl font-black uppercase tracking-widest shadow-lg">Simpan Event</button>
                </form>
            </div>

            <!-- TAB: CHAT -->
            <div id="view-chat" class="hidden animate-fade flex flex-col h-[calc(100vh-160px)]">
                <div class="flex-1 overflow-y-auto space-y-3 pr-2 card-dark p-4 rounded-xl mb-3" id="chat-container"></div>
                <form id="chat-form" class="flex gap-2 bg-white dark:bg-zinc-900 p-2 rounded-xl border dark:border-zinc-800">
                    <input type="text" id="chat-input" class="flex-1 bg-transparent border-none text-sm text-gray-900 dark:text-white px-2 focus:ring-0" placeholder="Ketik pesan..." required>
                    <button type="submit" class="bg-ygsred text-white p-2.5 rounded-lg"><i data-lucide="send" class="w-4 h-4"></i></button>
                </form>
            </div>

            <!-- TAB: ASSETS -->
            <div id="view-assets" class="hidden animate-fade space-y-4">
                <div class="flex justify-between items-center border-b-2 border-ygsred pb-1">
                    <h2 class="text-lg font-black uppercase">Inventaris</h2>
                    <div class="flex gap-2">
                        <select id="asset-sort-by" onchange="renderAssets()" class="text-[9px] bg-gray-100 dark:bg-zinc-800 font-bold border-none rounded px-2 focus:ring-0">
                            <option value="cat">Sort: Kategori</option>
                            <option value="status">Sort: Status</option>
                        </select>
                        <button class="text-[10px] bg-ygsred text-white px-3 py-1.5 rounded font-bold" onclick="openAssetModal()">+ Tambah</button>
                    </div>
                </div>
                <div id="asset-list-container" class="space-y-4"></div>
            </div>

            <!-- TAB: TEAM (ADMIN ONLY) -->
            <div id="view-team" class="hidden animate-fade space-y-4">
                <h2 class="text-lg font-black uppercase border-b-2 border-ygsred pb-1 inline-block">Manajemen Tim</h2>
                <div id="team-list" class="grid gap-3"></div>
            </div>

            <!-- TAB: PROFIL -->
            <div id="view-profile" class="hidden animate-fade space-y-4">
                <div class="card-dark p-6 rounded-2xl border-t-4 border-t-ygsred flex flex-col items-center text-center">
                    <div class="w-20 h-20 bg-gray-100 dark:bg-zinc-900 rounded-full flex items-center justify-center font-black text-3xl text-ygsred uppercase mb-4" id="profile-initial"></div>
                    <h3 id="profile-fullname" class="text-xl font-black uppercase mb-1"></h3>
                    <p id="profile-position" class="text-xs font-bold text-gray-500 uppercase mb-6"></p>
                    
                    <!-- REKAP GAJI -->
                    <div class="w-full grid grid-cols-3 gap-2 mb-6">
                        <div class="bg-green-50 dark:bg-green-950/20 p-2 rounded-xl border border-green-100 dark:border-green-900/50">
                            <p class="text-[8px] font-black uppercase text-green-600">Total Fee</p>
                            <p id="prof-fee" class="text-[10px] font-black text-gray-900 dark:text-white">Rp 0</p>
                        </div>
                        <div class="bg-red-50 dark:bg-red-950/20 p-2 rounded-xl border border-red-100 dark:border-red-900/50">
                            <p class="text-[8px] font-black uppercase text-red-600">Kas Bon</p>
                            <p id="prof-bon" class="text-[10px] font-black text-gray-900 dark:text-white">Rp 0</p>
                        </div>
                        <div class="bg-blue-50 dark:bg-blue-950/20 p-2 rounded-xl border border-blue-100 dark:border-blue-900/50">
                            <p class="text-[8px] font-black uppercase text-blue-600">Sisa</p>
                            <p id="prof-sisa" class="text-[10px] font-black text-gray-900 dark:text-white">Rp 0</p>
                        </div>
                    </div>

                    <button onclick="logout()" class="w-full bg-red-50 dark:bg-red-950/20 text-ygsred py-3 rounded-xl font-black text-xs uppercase border border-red-200 dark:border-red-900/50">Keluar Sistem</button>
                </div>
                <div class="card-dark p-4 rounded-2xl">
                    <h3 class="text-[10px] font-black uppercase mb-3 text-gray-500">Rincian Pendapatan per Event</h3>
                    <div id="profile-history" class="space-y-2"></div>
                </div>
            </div>

        </main>

        <!-- NAVIGATION -->
        <nav class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-black/95 border-t dark:border-zinc-800 flex justify-around p-2 z-[100] backdrop-blur-md overflow-x-auto hide-scrollbar">
            <button onclick="switchTab('list')" class="flex flex-col items-center gap-1 text-gray-400 p-2" id="nav-list"><i data-lucide="calendar" class="w-5 h-5"></i><span class="text-[8px] font-bold">JADWAL</span></button>
            <button onclick="switchTab('chat')" class="flex flex-col items-center gap-1 text-gray-400 p-2" id="nav-chat"><i data-lucide="message-square" class="w-5 h-5"></i><span class="text-[8px] font-bold">CHAT</span></button>
            <button onclick="switchTab('add')" class="hidden flex flex-col items-center gap-1 text-gray-400 p-2" id="nav-add"><i data-lucide="plus-square" class="w-5 h-5"></i><span class="text-[8px] font-bold">CREATE</span></button>
            <button onclick="switchTab('assets')" class="flex flex-col items-center gap-1 text-gray-400 p-2" id="nav-assets"><i data-lucide="box" class="w-5 h-5"></i><span class="text-[8px] font-bold">ASET</span></button>
            <button onclick="switchTab('team')" class="hidden flex flex-col items-center gap-1 text-gray-400 p-2" id="nav-team"><i data-lucide="users" class="w-5 h-5"></i><span class="text-[8px] font-bold">TIM</span></button>
            <button onclick="switchTab('profile')" class="flex flex-col items-center gap-1 text-gray-400 p-2" id="nav-profile"><i data-lucide="user" class="w-5 h-5"></i><span class="text-[8px] font-bold">PROFIL</span></button>
        </nav>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz6alw0e-EwkuHNc0g0L25WOUo-Dx_LyLsaf7DEBOVUGZlr7bTD6hJXWv66mFobfDM/exec'; 
        let currentUser = null;
        let allProjects = [];
        let allUsers = [];
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let activeAgendaView = 'kalender';

        function showLoading(show, text = 'Memproses...') {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('loading-overlay').classList.toggle('hidden', !show);
        }

        function showToast(msg, isError=false) {
            const container = document.getElementById('toast-container'); const t = document.createElement('div');
            t.className = `toast-show px-4 py-3 rounded-xl shadow-xl text-xs font-bold text-white flex items-center gap-2 pointer-events-auto ${isError ? 'bg-red-600' : 'bg-gray-900 dark:bg-zinc-800'}`;
            t.innerHTML = `<i data-lucide="${isError?'alert-circle':'check-circle'}" class="w-4 h-4"></i> ${msg}`;
            container.appendChild(t); if(typeof lucide!=='undefined') lucide.createIcons();
            setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 3000);
        }

        function formatRp(v) { return "Rp " + (Number(v) || 0).toLocaleString('id-ID'); }

        async function apiCall(payload) {
            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return JSON.parse(await res.text());
            } catch (e) {
                return { success: false, message: "Koneksi gagal" };
            }
        }

        window.onload = () => {
            const saved = localStorage.getItem('ygsUserEx');
            if(saved) { currentUser = JSON.parse(saved); initApp(); }
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }

        function toggleAuth(type) { 
            document.getElementById('login-form').classList.toggle('hidden', type !== 'login'); 
            document.getElementById('register-form').classList.toggle('hidden', type !== 'register'); 
            if(type === 'register') generateCaptcha();
        }

        function generateCaptcha() {
            const n1 = Math.floor(Math.random() * 10); const n2 = Math.floor(Math.random() * 10);
            window.capAns = n1 + n2; document.getElementById('captcha-question').innerText = `${n1} + ${n2}`;
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            showLoading(true, 'Login...');
            const res = await apiCall({ action: 'LOGIN', payload: { username: document.getElementById('log-username').value.toLowerCase(), password: document.getElementById('log-password').value } });
            showLoading(false);
            if(res && res.success) { currentUser = res.user; localStorage.setItem('ygsUserEx', JSON.stringify(currentUser)); initApp(); } 
            else showToast(res.message, true);
        };

        function initApp() {
            document.getElementById('view-auth').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser.nickname || currentUser.fullName;
            document.getElementById('profile-fullname').innerText = currentUser.fullName;
            document.getElementById('profile-position').innerText = currentUser.position;
            document.getElementById('profile-initial').innerText = (currentUser.nickname || currentUser.fullName).substring(0,2);
            
            // Hak Akses Admin
            if(currentUser.role === 'admin') {
                document.getElementById('nav-add').classList.remove('hidden');
                document.getElementById('nav-team').classList.remove('hidden');
            }

            fetchData();
            switchTab('list');
        }

        function switchTab(tab) {
            ['view-list', 'view-add', 'view-chat', 'view-assets', 'view-team', 'view-profile'].forEach(v => {
                const el = document.getElementById(v); if(el) el.classList.add('hidden');
            });
            document.getElementById('view-' + tab).classList.remove('hidden');
            ['nav-list', 'nav-chat', 'nav-add', 'nav-assets', 'nav-team', 'nav-profile'].forEach(n => {
                const nav = document.getElementById(n); if(!nav) return;
                nav.classList.remove('text-ygsred', 'bg-red-50', 'dark:bg-red-900/20');
                if(n === 'nav-' + tab) nav.classList.add('text-ygsred', 'bg-red-50', 'dark:bg-red-900/20');
            });
            if(tab === 'chat') renderChat();
            if(tab === 'assets') renderAssets();
            if(tab === 'team') renderTeam();
            if(tab === 'profile') renderProfileSchedule();
            window.scrollTo(0,0);
        }

        async function fetchData() {
            showLoading(true, 'Sync...');
            const resData = await apiCall({ action: 'GET_DATA' });
            const resUsers = await apiCall({ action: 'GET_USERS' });
            showLoading(false);
            if(resData && resData.success) { allProjects = resData.data; applyAgendaView(); }
            if(resUsers && resUsers.success) { 
                allUsers = resUsers.data; 
                document.getElementById('list-crew').innerHTML = allUsers.map(u => `<option value="${u.nickname || u.fullName}">`).join('');
            }
        }

        // --- ASSETS ---
        function openAssetModal() { document.getElementById('modal-asset').classList.remove('hidden'); }
        function closeAssetModal() { document.getElementById('modal-asset').classList.add('hidden'); document.getElementById('form-asset').reset(); }
        
        document.getElementById('form-asset').onsubmit = async (e) => {
            e.preventDefault();
            const p = { name: document.getElementById('ast-name').value, cat: document.getElementById('ast-cat').value, qty: document.getElementById('ast-qty').value, status: 'Baik', note: '' };
            showLoading(true); await apiCall({ action: 'SAVE_ASSET', payload: p }); showLoading(false);
            closeAssetModal(); renderAssets();
        };

        async function updateAssetStatus(id, s) {
            showLoading(true); await apiCall({ action: 'UPDATE_ASSET_STATUS', payload: { id, status: s } }); showLoading(false);
        }

        async function updateAssetNote(id, n) {
            showLoading(true); await apiCall({ action: 'UPDATE_ASSET_NOTE', payload: { id, note: n } }); showLoading(false);
        }

        async function renderAssets() {
            const container = document.getElementById('asset-list-container');
            const sortBy = document.getElementById('asset-sort-by').value;
            const res = await apiCall({ action: 'GET_ASSETS' });
            if(!res || !res.success) return;
            
            const groups = {};
            res.data.forEach(a => {
                const k = a[sortBy] || 'Lainnya';
                if(!groups[k]) groups[k] = []; groups[k].push(a);
            });

            container.innerHTML = Object.keys(groups).sort().map(k => {
                return `
                <div class="card-dark rounded-xl overflow-hidden">
                    <div class="bg-gray-100 dark:bg-zinc-900 px-4 py-2 border-b dark:border-zinc-800"><h3 class="text-[9px] font-black uppercase text-ygsred">${k}</h3></div>
                    <table class="w-full text-[10px]">
                        <tbody class="divide-y dark:divide-zinc-800">
                            ${groups[k].map(a => `
                            <tr>
                                <td class="p-3 font-bold uppercase">${a.name}</td>
                                <td class="p-3 text-center font-black">${a.qty}</td>
                                <td class="p-3">
                                    <select onchange="updateAssetStatus('${a.id}', this.value)" class="bg-transparent border-none focus:ring-0 font-bold ${a.status==='Baik'?'text-green-500':'text-red-500'}">
                                        <option value="Baik" ${a.status==='Baik'?'selected':''}>Baik</option>
                                        <option value="Rusak" ${a.status==='Rusak'?'selected':''}>Rusak</option>
                                        <option value="Service" ${a.status==='Service'?'selected':''}>Service</option>
                                        <option value="Hilang" ${a.status==='Hilang'?'selected':''}>Hilang</option>
                                    </select>
                                </td>
                                <td class="p-3"><input type="text" value="${a.note||''}" onblur="updateAssetNote('${a.id}', this.value)" placeholder="..." class="bg-transparent border-b border-gray-200 dark:border-zinc-800 w-full outline-none"></td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
            }).join('');
        }

        // --- FINANCE & TEAM ---
        function renderTeam() {
            const list = document.getElementById('team-list');
            list.innerHTML = allUsers.map(u => `
            <div class="bg-white dark:bg-zinc-900 p-4 rounded-xl flex justify-between items-center border dark:border-zinc-800">
                <div><p class="font-black text-sm uppercase">${u.fullName}</p><p class="text-[10px] text-ygsred font-bold uppercase">${u.position}</p></div>
                <button onclick="openFinanceModal('${u.nickname || u.fullName}')" class="text-blue-500 p-2"><i data-lucide="wallet"></i></button>
            </div>`).join('');
            lucide.createIcons();
        }

        function openFinanceModal(n) {
            document.getElementById('finance-crew-name').innerText = n;
            const container = document.getElementById('finance-modal-list');
            const crewEvents = allProjects.filter(p => JSON.stringify(p.manpower || {}).includes(n));
            container.innerHTML = crewEvents.map(p => {
                const f = (p.finance && p.finance[n]) || { fee: 0, bon: 0 };
                return `
                <div class="bg-gray-50 dark:bg-zinc-900 p-3 rounded-xl finance-row" data-pid="${p.id}">
                    <p class="text-[9px] font-black uppercase mb-2">${p.eventName}</p>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" class="fin-fee p-2 rounded input-dark" placeholder="Fee" value="${f.fee}">
                        <input type="number" class="fin-bon p-2 rounded input-dark" placeholder="Bon" value="${f.bon}">
                    </div>
                </div>`;
            }).join('') || '<p class="text-center text-xs">Belum ada event</p>';
            document.getElementById('modal-finance').classList.remove('hidden');
        }

        function closeFinanceModal() { document.getElementById('modal-finance').classList.add('hidden'); }

        async function saveFinance() {
            const n = document.getElementById('finance-crew-name').innerText;
            const data = [];
            document.querySelectorAll('.finance-row').forEach(row => {
                data.push({ projectId: row.dataset.pid, fee: row.querySelector('.fin-fee').value, bon: row.querySelector('.fin-bon').value });
            });
            showLoading(true); await apiCall({ action: 'UPDATE_FINANCE', payload: { crewName: n, data } }); showLoading(false);
            closeFinanceModal(); fetchData();
        }

        function renderProfileSchedule() {
            const n = currentUser.nickname || currentUser.fullName;
            const matches = allProjects.filter(p => JSON.stringify(p.manpower || {}).includes(n));
            let tFee = 0, tBon = 0;
            const history = document.getElementById('profile-history');
            history.innerHTML = matches.map(p => {
                const f = (p.finance && p.finance[n]) || { fee: 0, bon: 0 };
                tFee += Number(f.fee); tBon += Number(f.bon);
                return `
                <div class="bg-gray-50 dark:bg-zinc-900/50 p-3 rounded-lg flex justify-between items-center text-[9px] font-bold">
                    <span>${p.eventName}</span>
                    <div class="text-right">
                        <p class="text-green-600">+ ${formatRp(f.fee)}</p>
                        <p class="text-red-500">- ${formatRp(f.bon)}</p>
                    </div>
                </div>`;
            }).join('') || '<p class="text-center text-[8px]">Belum ada riwayat</p>';
            document.getElementById('prof-fee').innerText = formatRp(tFee);
            document.getElementById('prof-bon').innerText = formatRp(tBon);
            document.getElementById('prof-sisa').innerText = formatRp(tFee - tBon);
        }

        // --- JADWAL ---
        document.getElementById('event-form').onsubmit = async (e) => {
            e.preventDefault();
            const p = { 
                id: document.getElementById('edit-id').value || 'YGS-' + Date.now(), 
                eventName: document.getElementById('eventName').value, 
                artist: document.getElementById('artist').value, 
                eventDate: document.getElementById('startDate').value, 
                status: document.getElementById('evStatus').value,
                manpower: { pic: document.getElementById('pic').value, others: document.getElementById('manpower-input').value }
            };
            showLoading(true); await apiCall({ action: 'ADD_DATA', payload: p }); showLoading(false);
            switchTab('list'); fetchData();
        };

        function setAgendaView(m) { activeAgendaView = m; applyAgendaView(); }
        function applyAgendaView() {
            const wrap = document.getElementById('wrapper-kalender');
            const cont = document.getElementById('project-container');
            wrap.classList.toggle('hidden', activeAgendaView !== 'kalender');
            if(activeAgendaView === 'kalender') renderCalendar();
            else {
                let filtered = allProjects;
                if(activeAgendaView === 'saya') filtered = allProjects.filter(p => JSON.stringify(p.manpower || {}).includes(currentUser.nickname || currentUser.fullName));
                cont.innerHTML = filtered.map(p => renderEventCard(p)).join('') || '<p class="text-center text-xs">Kosong</p>';
                lucide.createIcons();
            }
        }

        function renderEventCard(p) {
            return `
            <div class="bg-white dark:bg-zinc-900 p-4 rounded-xl border-l-4 border-l-ygsred flex justify-between items-center shadow-sm">
                <div><h3 class="font-black text-sm uppercase">${p.eventName}</h3><p class="text-[10px] text-ygsred font-black uppercase">${p.artist}</p></div>
                <div class="flex gap-2">${currentUser.role==='admin'?`<button onclick="deleteEvent('${p.id}')" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`:''}<i data-lucide="chevron-right" class="text-gray-400"></i></div>
            </div>`;
        }

        async function deleteEvent(id) {
            if(!confirm("Hapus?")) return; showLoading(true);
            await apiCall({ action: 'DELETE_DATA', payload: { id } }); showLoading(false); fetchData();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
            document.getElementById('cal-month-year').innerText = new Date(currentYear, currentMonth).toLocaleDateString('id-ID', {month:'long', year:'numeric'});
            for(let i=1; i<=daysInMonth; i++) {
                const dStr = `${currentYear}-${String(currentMonth+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const hasE = allProjects.some(p => p.eventDate === dStr);
                grid.innerHTML += `<div class="cal-day ${hasE?'has-event':''}" onclick="showEventsOnDate('${dStr}')">${i}</div>`;
            }
        }

        function showEventsOnDate(d) {
            const f = allProjects.filter(p => p.eventDate === d);
            document.getElementById('project-container').innerHTML = f.map(p => renderEventCard(p)).join('') || '<p class="text-center p-10 text-red-500 font-bold">KOSONG</p>';
            lucide.createIcons();
        }

        function changeMonth(v) { currentMonth += v; if(currentMonth>11){currentMonth=0;currentYear++} if(currentMonth<0){currentMonth=11;currentYear--} renderCalendar(); }

        async function renderChat() {
            const cont = document.getElementById('chat-container');
            const res = await apiCall({ action: 'GET_CHATS' });
            if(!res || !res.success) return;
            cont.innerHTML = res.data.map(c => {
                const isMe = c.sender === (currentUser.nickname || currentUser.fullName);
                return `<div class="flex flex-col ${isMe?'items-end':'items-start'}"><span class="text-[8px] font-bold text-gray-500">${c.sender}</span><div class="px-3 py-2 rounded-xl text-xs font-bold ${isMe?'bg-ygsred text-white':'bg-gray-100 dark:bg-zinc-800'}">${c.msg}</div></div>`;
            }).join('');
            cont.scrollTop = cont.scrollHeight;
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault(); const i = document.getElementById('chat-input');
            const p = { sender: currentUser.nickname || currentUser.fullName, msg: i.value, time: new Date().toISOString() };
            i.value = ''; await apiCall({ action: 'ADD_CHAT', payload: p }); renderChat();
        };

        function logout() { localStorage.removeItem('ygsUserEx'); location.reload(); }

    </script>
</body>
</html>
